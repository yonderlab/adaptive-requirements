name: Release

on:
  push:
    tags:
      - 'engine@*'
      - 'dynamic-form@*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test

      - name: Determine package to publish
        id: pkg
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$TAG" == engine@* ]]; then
            echo "dir=packages/engine" >> "$GITHUB_OUTPUT"
            echo "name=engine" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == dynamic-form@* ]]; then
            echo "dir=packages/dynamic-form" >> "$GITHUB_OUTPUT"
            echo "name=dynamic-form" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Unrecognized tag format: $TAG"
            exit 1
          fi

      - name: Publish to npm
        working-directory: ${{ steps.pkg.outputs.dir }}
        run: pnpm publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
