name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm (Trusted Publishing)
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          # setup-node creates .npmrc with _authToken=${NODE_AUTH_TOKEN}
          # and sets NODE_AUTH_TOKEN to GITHUB_TOKEN. Both must be cleared
          # for npm to fall back to OIDC Trusted Publishing via --provenance.
          unset NODE_AUTH_TOKEN
          sed -i '/_authToken/d' "$NPM_CONFIG_USERCONFIG"
          failed=0
          publish_pkg() {
            local dir=$1
            cd "packages/$dir"
            local name=$(node -p "require('./package.json').name")
            local version=$(node -p "require('./package.json').version")
            if npm view "${name}@${version}" version >/dev/null 2>&1; then
              echo "::notice::${name}@${version} already published — skipping"
            else
              echo "Publishing ${name}@${version}..."
              TARBALL=$(pnpm pack --pack-destination /tmp)
              if ! npm publish "$TARBALL" --provenance --access public; then
                echo "::error::Failed to publish ${name}@${version}"
                failed=1
              fi
            fi
            cd "$GITHUB_WORKSPACE"
          }
          publish_pkg adaptive-requirements-engine
          publish_pkg adaptive-form
          exit "$failed"
